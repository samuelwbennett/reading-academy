<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="A quiet forest path winding between trees">
  <defs>
    <linearGradient id="f-sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e7f0e2"/>
      <stop offset="100%" stop-color="#c7dec1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#f-sky)"/>
  <!-- distant hills -->
  <path d="M0 240 Q200 200 400 230 T800 220 L800 280 L0 280 Z" fill="#9bc88a" opacity="0.7"/>
  <!-- ground -->
  <rect y="280" width="800" height="120" fill="#d6c39a"/>
  <!-- path -->
  <path d="M380 400 Q400 350 410 320 Q420 300 460 280 L520 280 Q470 320 440 360 Q425 380 420 400 Z" fill="#c0a778"/>
  <!-- trees: simple triangles -->
  <g>
    <polygon points="120,280 90,330 150,330" fill="#5a8245"/>
    <polygon points="120,260 95,320 145,320" fill="#7eb073"/>
    <rect x="115" y="328" width="10" height="20" fill="#7a432a"/>
  </g>
  <g>
    <polygon points="220,290 188,340 252,340" fill="#5a8245"/>
    <rect x="215" y="338" width="10" height="22" fill="#7a432a"/>
  </g>
  <g>
    <polygon points="600,275 565,335 635,335" fill="#5a8245"/>
    <polygon points="600,255 570,320 630,320" fill="#7eb073"/>
    <rect x="595" y="333" width="10" height="22" fill="#7a432a"/>
  </g>
  <g>
    <polygon points="700,300 670,350 730,350" fill="#3f6c47"/>
    <rect x="695" y="348" width="10" height="22" fill="#7a432a"/>
  </g>
</svg>
